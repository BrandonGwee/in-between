<html>

<head>
    <link rel="stylesheet" href="../css/global.css" />
    <script type="module" src="../js/gamePage.js"></script>
</head>

<body id="game-body">
    <h1>Guess!</h1>
    <h2>Will the next number be between these two?</h2>

    <div id="card-container">
        <div class="card" id="left-card"></div>
        <div class="card" id="mid-card"></div>
        <div class="card" id="right-card"></div>
    </div>

    <div id="button-container">
        <button id="yes-btn" type="button">YES</button>
        <button id="no-btn" type="button">NO</button>
    </div>

    <div id="exit-btn"></div>

    <div id="cheat-sheet">
        <div class="title">Cheat Sheet</div>
        <div class="item" id="discarded">Show discard pile<div></div>
        </div>

        <div class="item" id="remainder">Show remaining cards<div></div>
        </div>
    </div>
</body>

</html>
